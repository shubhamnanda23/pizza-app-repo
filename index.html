<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubham's Pizza Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-pizza { animation: float 4s ease-in-out infinite; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass max-w-4xl w-full rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-white/20">
        
        <div class="bg-orange-500 w-full md:w-1/2 p-10 flex items-center justify-center relative overflow-hidden">
            <div class="absolute top-5 left-5 text-white font-bold text-xl">PizzaHub</div>
            <div class="animate-pizza text-8xl">🍕</div>
            <div class="absolute bottom-10 text-white/80 text-sm italic font-medium">Baking Happiness since 2026</div>
        </div>

        <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-2">Deliciously Fresh!</h1>
            <p class="text-gray-500 mb-8 font-medium">Hungry? Order from Shubham's Kitchen and get it delivered in 20 mins. 🚀</p>
            
            <div class="space-y-4">
                <div class="flex items-center p-4 border rounded-2xl hover:border-orange-500 transition cursor-pointer group">
                    <span class="text-2xl mr-4 group-hover:scale-125 transition">🧀</span>
                    <div>
                        <h3 class="font-bold text-gray-800">Double Cheese Margherita</h3>
                        <p class="text-sm text-gray-400">Classic tomato & extra mozzarella</p>
                    </div>
                </div>

                <div class="flex items-center p-4 border rounded-2xl hover:border-orange-500 transition cursor-pointer group">
                    <span class="text-2xl mr-4 group-hover:scale-125 transition">🌶️</span>
                    <div>
                        <h3 class="font-bold text-gray-800">Spicy Paneer Tikka</h3>
                        <p class="text-sm text-gray-400">Marinated paneer with peri-peri</p>
                    </div>
                </div>
            </div>

            <button class="mt-10 bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-orange-600 hover:-translate-y-1 transition-all active:scale-95 shadow-orange-200">
                Order Now - Live Tracking
            </button>
        </div>
    </div>

</body>
</html>
